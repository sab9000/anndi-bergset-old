name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

concurrency:
  group: deploy-sab9000-anndi-bergset-old
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/sab9000/anndi-bergset-old:sha-${{ github.sha }}

      - name: Trigger deploy
        id: deploy
        run: |
          resp=$(curl -fsS -X POST "${{ secrets.DEPLOY_URL }}/deploy/sab9000-anndi-bergset-old" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"image":"${{ steps.build.outputs.digest }}"}')
          echo "task_id=$(echo "$resp" | jq -r .task_id)" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy to finish
        run: |
          for i in $(seq 1 60); do
            s=$(curl -fsS "${{ secrets.DEPLOY_URL }}/deployments/${{ steps.deploy.outputs.task_id }}" | jq -r .status)
            echo "status=$s"
            case "$s" in
              success) exit 0 ;;
              failed|cancelled) echo "deploy $s"; exit 1 ;;
            esac
            sleep 5
          done
          echo "timed out waiting for deploy"; exit 1
